<div class="card">
  <img class="card-img-top" src="http://localhost:3000/images/{{trip.image}}" alt="{{trip.name}}">
  <div class="card-body">
    <h5 class="card-title">
      <span>{{trip.name}}</span>
      <span class="float-end">{{trip.perPerson|currency:'USD':'symbol'}} pp</span>
    </h5>
    <h6 class="card-subtitle mb-2 text-body-secondary">{{trip.resort}}</h6>
    <p class="card-text" [innerHTML]="trip.description"></p>
    <a (click)="editTrip(trip)" class="btn btn-primary">Edit Trip</a>
  </div>
</div>
