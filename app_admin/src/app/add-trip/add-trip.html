<h3>Add a Trip</h3>
<form [formGroup]="addForm" (ngSubmit)="onSubmit()">
  <div class="form-group">
    <label for="code">Code</label>
    <input type="text" class="form-control" id="code" formControlName="code">
    <div *ngIf="submitted && f['code'].errors" class="invalid-feedback d-block">
      <div *ngIf="f['code'].errors['required']">Code is required</div>
    </div>
  </div>
  <div class="form-group">
    <label for="name">Name</label>
    <input type="text" class="form-control" id="name" formControlName="name">
    <div *ngIf="submitted && f['name'].errors" class="invalid-feedback d-block">
      <div *ngIf="f['name'].errors['required']">Name is required</div>
    </div>
  </div>
  <div class="form-group">
    <label for="length">Length</label>
    <input type="text" class="form-control" id="length" formControlName="length">
    <div *ngIf="submitted && f['length'].errors" class="invalid-feedback d-block">
      <div *ngIf="f['length'].errors['required']">Length is required</div>
    </div>
  </div>
  <div class="form-group">
    <label for="start">Start Date</label>
    <input type="date" class="form-control" id="start" formControlName="start">
    <div *ngIf="submitted && f['start'].errors" class="invalid-feedback d-block">
      <div *ngIf="f['start'].errors['required']">Start date is required</div>
    </div>
  </div>
  <div class="form-group">
    <label for="resort">Resort</label>
    <input type="text" class="form-control" id="resort" formControlName="resort">
    <div *ngIf="submitted && f['resort'].errors" class="invalid-feedback d-block">
      <div *ngIf="f['resort'].errors['required']">Resort is required</div>
    </div>
  </div>
  <div class="form-group">
    <label for="perPerson">Per Person</label>
    <input type="text" class="form-control" id="perPerson" formControlName="perPerson">
    <div *ngIf="submitted && f['perPerson'].errors" class="invalid-feedback d-block">
      <div *ngIf="f['perPerson'].errors['required']">Per person price is required</div>
    </div>
  </div>
  <div class="form-group">
    <label for="image">Image</label>
    <input type="text" class="form-control" id="image" formControlName="image">
    <div *ngIf="submitted && f['image'].errors" class="invalid-feedback d-block">
      <div *ngIf="f['image'].errors['required']">Image is required</div>
    </div>
  </div>
  <div class="form-group">
    <label for="description">Description</label>
    <textarea class="form-control" id="description" rows="5" formControlName="description"></textarea>
    <div *ngIf="submitted && f['description'].errors" class="invalid-feedback d-block">
      <div *ngIf="f['description'].errors['required']">Description is required</div>
    </div>
  </div>
  <button type="submit" class="btn btn-primary mt-2">Save</button>
</form>
